<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MEMBERS LOGIN | THIRSTYCLUB999</title>
  <meta name="description" content="Access the Thirstyclub999 Clubhouse passport and member resources.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css?v=20260610.1430">
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page-body">
  <!-- Dynamic Cursor Glow Background -->
  <div id="cursor-glow"></div>

  <!-- Header Navigation -->
  <header>
    <a href="index.html" class="logo">THIRSTYCLUB<span id="logo-counter">999</span></a>
    <nav>
      <a href="index.html" class="nav-btn">Home</a>
    </nav>
  </header>

  <!-- Login Area -->
  <main class="login-main">
    <div class="login-container">
      <div class="auth-card glass-panel">
        
        <!-- Login State -->
        <div id="login-state" class="auth-state">
          <h3 class="auth-title">MEMBERS LOGIN</h3>
          <form id="login-form">
            <p class="modal-desc">Login with your ThirstyID, Username, or Email.</p>
            
            <div class="input-group">
              <label for="login-id">ThirstyID / Username / Email</label>
              <input type="text" id="login-id" name="username" autocomplete="username" placeholder="T999-XXXX, username, or email..." required>
            </div>
            
            <div class="input-group">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                <label for="login-password" style="margin-bottom: 0;">Password</label>
                <button type="button" id="forgot-password-trigger" style="background: none; border: none; color: var(--accent-color); font-size: 0.75rem; cursor: pointer; padding: 0; font-family: inherit; text-decoration: underline; text-transform: uppercase; letter-spacing: 0.05em; transition: var(--transition-smooth);">Forgot Password?</button>
              </div>
              <input type="password" id="login-password" name="password" autocomplete="current-password" placeholder="enter password..." required>
            </div>
            
            <button type="submit" class="submit-ticket-btn">Login</button>
            
            <div class="auth-back-link" style="margin-top: 1.5rem; text-align: center;">
              <a href="index.html" style="font-size: 0.75rem; color: var(--text-dim); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: var(--transition-smooth);">← BACK TO HOME</a>
            </div>
          </form>
        </div>

        <!-- Forgot Password State -->
        <div id="forgot-state" class="auth-state" style="display: none;">
          <h3 class="auth-title">RESET REQUEST</h3>
          <form id="forgot-form">
            <p class="modal-desc">Enter your ThirstyID, Username, or Email to request a recovery link.</p>
            
            <div class="input-group">
              <label for="forgot-id">ThirstyID / Username / Email</label>
              <input type="text" id="forgot-id" placeholder="T999-XXXX, username, or email..." required>
            </div>
            
            <button type="submit" class="submit-ticket-btn">Send Reset Link</button>
            
            <div class="auth-back-link" style="margin-top: 1.5rem; text-align: center;">
              <button type="button" id="back-to-login-btn" style="background: none; border: none; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; padding: 0; font-family: inherit; letter-spacing: 0.1em; text-transform: uppercase; transition: var(--transition-smooth);">← BACK TO LOGIN</button>
            </div>
          </form>
        </div>

        <!-- Reset Password (Recovery) State -->
        <div id="reset-state" class="auth-state" style="display: none;">
          <h3 class="auth-title">NEW PASSWORD</h3>
          <form id="reset-form">
            <p class="modal-desc">Set a new secure password for your account.</p>
            
            <div class="input-group">
              <label for="reset-password">New Password</label>
              <input type="password" id="reset-password" name="new-password" autocomplete="new-password" placeholder="enter new password..." required>
            </div>
            
            <div class="input-group">
              <label for="reset-password-confirm">Confirm Password</label>
              <input type="password" id="reset-password-confirm" name="confirm-new-password" autocomplete="new-password" placeholder="confirm new password..." required>
            </div>
            
            <button type="submit" class="submit-ticket-btn">Update Password</button>
          </form>
        </div>

        <!-- Success Message State -->
        <div id="message-state" class="auth-state" style="display: none;">
          <div style="font-size: 3rem; text-align: center; margin-bottom: 1rem; text-shadow: 0 0 10px rgba(255, 62, 62, 0.4);">✨</div>
          <h3 class="auth-title" id="message-title">SUCCESS</h3>
          <p class="modal-desc" id="message-desc">Your action was completed successfully.</p>
          <button type="button" id="message-action-btn" class="submit-ticket-btn">Continue</button>
        </div>

      </div>
    </div>
  </main>

  <script src="main.js?v=20260610.1430"></script>
</body>
</html>
